        <!--
            Pre-paint branding bootstrap.

            Runs in the <head> BEFORE the splash <img> is parsed so the
            browser never has a chance to paint the SmartCommerce default
            logo on white-label domains.

            Three paths:
            1) localStorage cache present → apply the user's brand to title,
               favicon, meta tags + set CSS class so splash <img> uses the
               cached logo URL when it renders.
            2) Default SmartCommerce domain (no cache) → keep HTML defaults.
            3) Custom domain, no cache → neutralize: hide splash <img> via
               CSS class (applied before paint), blank title/favicon/metas
               so nothing SC-branded leaks while BrandingService.initialize()
               fetches the real brand.

            DEFAULT_DOMAINS mirrors src/app/core/branding/branding.service.ts
            — keep in sync.
        -->
        <style>
            html.sc-neutralize-splash #splash-logo {
                visibility: hidden !important;
            }
        </style>
        <script>
            (function () {
                var DEFAULT_DOMAINS = [
                    'app.smartcommerce.lat',
                    'dev.smartcommerce.lat',
                    'localhost',
                ];
                var isDefaultDomain =
                    DEFAULT_DOMAINS.indexOf(window.location.hostname) !== -1;

                var setMeta = function (sel, val) {
                    var el = document.querySelector(sel);
                    if (el) el.setAttribute('content', val == null ? '' : val);
                };
                var setFavicons = function (href) {
                    var icons = document.querySelectorAll(
                        'link[rel="icon"], link[rel="apple-touch-icon"]'
                    );
                    for (var i = 0; i < icons.length; i++) {
                        icons[i].setAttribute('href', href);
                    }
                };

                var cached = null;
                try {
                    var raw = localStorage.getItem('sc_branding');
                    if (raw) cached = JSON.parse(raw);
                } catch (_) {}

                // Path 1: cache present — stash for the body script and
                // apply head-level metadata now so the tab title/favicon
                // never flash SC defaults either.
                if (cached) {
                    try {
                        if (cached.seo && cached.seo.title) {
                            document.title = cached.seo.title;
                        } else if (cached.name) {
                            document.title = cached.name;
                        }
                        if (cached.faviconUrl) {
                            setFavicons(cached.faviconUrl);
                        }
                        if (cached.colors && cached.colors.primary) {
                            var theme = document.querySelector(
                                'meta[name="theme-color"]'
                            );
                            if (theme)
                                theme.setAttribute(
                                    'content',
                                    cached.colors.primary
                                );
                        }
                        if (cached.seo) {
                            setMeta(
                                'meta[name="description"]',
                                cached.seo.description
                            );
                            setMeta('meta[name="author"]', cached.name);
                            setMeta(
                                'meta[property="og:title"]',
                                cached.seo.title || cached.name
                            );
                            setMeta(
                                'meta[property="og:description"]',
                                cached.seo.description
                            );
                            setMeta('meta[property="og:site_name"]', cached.name);
                            setMeta(
                                'meta[property="twitter:title"]',
                                cached.seo.title || cached.name
                            );
                            setMeta(
                                'meta[property="twitter:description"]',
                                cached.seo.description
                            );
                            if (cached.seo.twitterHandle) {
                                setMeta(
                                    'meta[property="twitter:site"]',
                                    cached.seo.twitterHandle
                                );
                            }
                            if (cached.seo.canonicalBase) {
                                var canonicalHref =
                                    cached.seo.canonicalBase +
                                    window.location.pathname;
                                setMeta(
                                    'meta[property="og:url"]',
                                    canonicalHref
                                );
                                setMeta(
                                    'meta[property="twitter:url"]',
                                    canonicalHref
                                );
                                var canon = document.querySelector(
                                    'link[rel="canonical"]'
                                );
                                if (canon)
                                    canon.setAttribute('href', canonicalHref);
                            }
                        }
                        // Prefer brand-configured OG image; fall back to logoUrl.
                        var ogImg =
                            (cached.seo && cached.seo.ogImage) ||
                            cached.logoUrl;
                        if (ogImg) {
                            setMeta('meta[property="og:image"]', ogImg);
                            setMeta('meta[property="twitter:image"]', ogImg);
                        }
                        // The splash <img> doesn't exist yet — the body
                        // script will swap its src using window.__scBranding.
                        window.__scBranding = cached;
                    } catch (_) {}
                    return;
                }

                // Path 2: default SC domain, no cache — keep HTML defaults.
                if (isDefaultDomain) return;

                // Path 3: custom domain, no cache — neutralize everything.
                try {
                    // CSS class hides the splash <img> before first paint.
                    document.documentElement.classList.add(
                        'sc-neutralize-splash'
                    );

                    // Use the hostname as a neutral, non-SC tab title while
                    // BrandingService.initialize() fetches the real brand.
                    // Empty string would show "Untitled" or the URL depending
                    // on the browser — hostname is cleaner and on-brand.
                    document.title = window.location.hostname;

                    // Transparent SVG favicon so the tab icon stops being SC.
                    setFavicons(
                        'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%201%201%22%2F%3E'
                    );

                    setMeta('meta[name="description"]', '');
                    setMeta('meta[name="author"]', '');
                    setMeta('meta[property="og:title"]', '');
                    setMeta('meta[property="og:description"]', '');
                    setMeta('meta[property="og:image"]', '');
                    setMeta('meta[property="og:site_name"]', '');
                    setMeta('meta[property="og:url"]', '');
                    setMeta('meta[property="twitter:title"]', '');
                    setMeta('meta[property="twitter:description"]', '');
                    setMeta('meta[property="twitter:image"]', '');
                    setMeta('meta[property="twitter:url"]', '');

                    var canon2 = document.querySelector(
                        'link[rel="canonical"]'
                    );
                    if (canon2) canon2.setAttribute('href', '');
                } catch (_) {}
            })();

    <body style="touch-action: manipulation">
        <!-- Splash screen -->
        <fuse-splash-screen>
            <div id="splash-screen" style="
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    width: 100%;
                    height: 100%;
                ">
                <img id="splash-logo" src="images/logo/vtiger-crm-logo.png" alt="Smart Commerce - Dropshipping Latinoamérica" style="
                        max-width: 200px;
                        filter: drop-shadow(0 8px 24px rgba(33, 150, 243, 0.4));
                    ">
                <div class="spinner">
                    <div class="bounce1"></div>
                    <div class="bounce2"></div>
                    <div class="bounce3"></div>
                </div>
            </div>
        </fuse-splash-screen>

        <!--
            Splash logo from cached branding.
            Head script already handled title/favicon/metas + CSS-hide for
            uncached custom domains. This applies the cached logo+glow to
            the splash <img> now that the element exists in the DOM.
        -->
        <script>
            (function () {
                try {
                    var b = window.__scBranding;
                    if (!b) return;
                    var img = document.getElementById('splash-logo');
                    if (!img || !b.logoUrl) return;
                    img.src = b.logoUrl;
                    img.alt = b.name || img.alt;
                    if (b.colors && b.colors.primary) {
